<html>

<head>
    <style>
        .network-signals {
            width: 300px;
            height: 200px;
            background-color: beige;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 5px;
        }

        .network-signals span {
            display: inline-block;
        }

        .network-signals span:nth-child(1) {
            height: 50%;
        }

        .network-signals span:nth-child(2) {
            height: 75%;
        }

        .network-signals span:nth-child(3) {
            height: 100%;
        }

        .network-signal {
            width: 20%;
            background-color: #363d4a;
        }
    </style>
</head>

<body>
    <div class="network-signals">
        <span class="network-signal"></span><span class="network-signal"></span><span class="network-signal"></span>
    </div>
</body>

</html>
