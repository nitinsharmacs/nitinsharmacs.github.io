<html>

<head>
    <title>Smartphone</title>
    <link rel="stylesheet" href="smartphone.css">
</head>

<body>
    <div class="container">
        <div class="smartphone-body">
            <div class="upper-part">
                <div class="camera"></div>
                <div class="speaker"></div>
            </div>
            <div class="display">
                <div class="status-bar">
                    <div class="network-signals">
                        <span class="network-signal"></span>
                        <span class="network-signal"></span>
                        <span class="network-signal"></span>
                    </div>
                    <div class="time">
                        <time datetime="12:22">12:22 AM</time>
                    </div>
                    <div class="battery">
                        <span class="battery-percentage">50%</span>
                        <div class="battery-icon">
                            <span class="battery-percentage-bar"></span>
                        </div>
                    </div>
                </div>
                <div class="apps">
                    <div class="app">
                        <div class="app-icon">
                            <img src="images/apps/gallery.png" alt="">
                        </div>
                        <p class="app-name">Gallery</p>
                    </div>
                </div>
            </div>
            <div class="lower-part">
                <div class="home-button"></div>
            </div>
        </div>
    </div>
</body>

</html>
